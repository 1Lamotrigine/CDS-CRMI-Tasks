<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Art</title>
    <link rel="stylesheet" href="./style.css">

    <!-- Layouts -->
    
    <!-- <link rel="stylesheet" href="./layouts/heart.css"> -->

<body>
    <div class="app">
        <div class="grid">
            <!-- Letters row -->
            <div class="row letter__row">
                <div class="cell"></div>
                <div class="cell">a</div>
                <div class="cell">b</div>
                <div class="cell">c</div>
                <div class="cell">d</div>
                <div class="cell">e</div>
                <div class="cell">f</div>
                <div class="cell">g</div>
                <div class="cell">h</div>
            </div>
            <!-- Row One -->
            <div class="row row__one">
                <div class="cell cell__number">1</div>
                <div class="cell empty a1"></div>
                <div class="cell empty b1"></div>
                <div class="cell empty c1"></div>
                <div class="cell empty d1"></div>
                <div class="cell empty e1"></div>
                <div class="cell empty f1"></div>
                <div class="cell empty g1"></div>
                <div class="cell empty h1"></div>
            </div>
            <!-- Row Two -->

            </div>
            <!-- Row Three -->

                <div class="cell empty g3"></div>
                <div class="cell empty h3"></div>
            </div>
            <!-- Row Four -->
            <div class="row row__four">
                <div class="cell cell__number">4</div>
                <div class="cell empty a4"></div>
                <div class="cell empty b4"></div>
                <div class="cell empty c4"></div>
                <div class="cell empty d4"></div>
                <div class="cell empty e4"></div>
                <div class="cell empty f4"></div>
                <div class="cell empty g4"></div>

            </div>
            <!-- Row Five -->

                <div class="cell cell__number">5</div>

                <div class="cell empty d5"></div>
                <div class="cell empty e5"></div>
                <div class="cell empty f5"></div>

                <div class="cell empty h5"></div>
            </div>
            <!-- Row Six -->

                <div class="cell cell__number">6</div>

                <div class="cell empty b6"></div>
                <div class="cell empty c6"></div>
                <div class="cell empty d6"></div>
                <div class="cell empty e6"></div>
                <div class="cell empty f6"></div>
                <div class="cell empty g6"></div>
                <div class="cell empty h6"></div>
            </div>

                <div class="cell cell__number">7</div>

                <div class="cell empty c7"></div>

                <div class="cell empty e7"></div>
                <div class="cell empty f7"></div>
